  <script>
    const games = ["SGA Gates of Olympus","Gates of Olympus","Gates of Olympus 1000","Mahjong Wins 2","Mahjong Wins 3","Sweet Bonanza 1000","Mahjong Ways 2","Starlight Princess 1000","Starlight Princess","Gates of Gatot Kaca","Gates of Gatot Kaca 1000","Wild Bandito","Aztec Gems"];

    function generateGacor(userId) {
      let seed = 0;
      for (let i = 0; i < userId.length; i++) seed += userId.charCodeAt(i);
      let results = [];
      for (let i = 0; i < 3; i++) {
        let index = (seed + i * 7) % games.length;
        let winrate;

if (i === 0) {
  // TOP GAME (95% - 99%)
  winrate = 95 + ((seed) % 5);
} else {
  // GAME LAIN (82% - 94%)
  winrate = 86 + ((seed + i * 11) % 13);
}
        results.push({ game: games[index], winrate });
      }
      results.sort((a, b) => b.winrate - a.winrate);
      return results;
    }
    function generatePola(userId) {
  const polaList = [
    "Auto 10x - Manual 5x",
    "Auto 20x - Manual 10x",
    "Auto 30x - Manual 15x",
    "Manual 10x - Turbo 20x",
    "Auto 50x - Stop - Manual 10x",
    "Turbo 25x - Auto 15x",
    "Manual 10x - Auto 40x"
  ];

  let seed = 0;
  for (let i = 0; i < userId.length; i++) {
    seed += userId.charCodeAt(i);
  }

  let index = seed % polaList.length;
  return polaList[index];
}

    function startGacha() {
      const userId = document.getElementById("userId").value;
      const loading = document.getElementById("loading");
      const resultDiv = document.getElementById("result");
      const winSound = document.getElementById("winSound");
      const depositBtn = document.getElementById("depositBtn");
      const chatBtn = document.getElementById("chatBtn");

      if (!userId) { alert("Masukkan User ID dulu bro!"); return; }

      depositBtn.style.display = 'none';
      chatBtn.style.display = 'none';
      resultDiv.classList.add("hidden");
      loading.classList.remove("hidden");

      // Animasi spin
      let reelHtml = '';
      for (let i = 0; i < 3; i++) reelHtml += `<div class='slot-reel spin-animation'>🎰</div>`;
      resultDiv.innerHTML = reelHtml;
      resultDiv.classList.remove("hidden");

      setTimeout(() => {
        const results = generateGacor(userId);
        let html = "<h2 class='text-xl font-bold mb-2'>🔥 HASIL GACOR 🔥</h2>";
        results.forEach((r, i) => {
          html += `<div class='mb-3 p-3 rounded-lg ${i===0?'bg-red-400 text-black':'bg-gray-700'}'>
          <b>${i+1}. ${r.game}</b><br>
          𝐖𝐈𝐍𝐑𝐀𝐓𝐄 : ${r.winrate}% ${i===0?'(𝗧𝗢𝗣 𝗚𝗔𝗠𝗘)':''}
          </div>`;
        });

        html += `<div class='mt-4 text-sm'>⏰ Jam Hoki: ${generateJam()}<br>🎯 Pola: ${generatePola(userId)}</div>`;

        resultDiv.innerHTML = html;
        loading.classList.add("hidden");
        winSound.play();

        depositBtn.style.display = 'inline-block';
        chatBtn.style.display = 'inline-block';
      }, 1500);
    }

    function generateJam() {
      const now = new Date();
      let start = now.getHours() + Math.floor(Math.random() * 3);
      start = start % 24;
      let end = (start + 2) % 24;
      return `${String(start).padStart(2,'0')}:00 - ${String(end).padStart(2,'0')}:30`
    }
  </script>
